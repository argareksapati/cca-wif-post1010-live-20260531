name: WIF Post-1010 Variant Proof

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  id-token: write

jobs:
  env-proof:
    if: contains(github.event.issue.body, '@claude')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Make fake Claude executable runnable
        run: chmod +x .github/scripts/fake-claude-cli.js

      - name: Run claude-code-action with fake executable
        uses: anthropics/claude-code-action@main
        with:
          github_token: ${{ github.token }}
          anthropic_federation_rule_id: fdrl_test
          anthropic_organization_id: 00000000-0000-0000-0000-000000000000
          anthropic_service_account_id: svac_test
          anthropic_workspace_id: wrkspc_test
          path_to_claude_code_executable: ${{ github.workspace }}/.github/scripts/fake-claude-cli.js

      - name: Show env proof
        run: |
          test -f "$RUNNER_TEMP/cca-wif-env-proof.txt"
          cat "$RUNNER_TEMP/cca-wif-env-proof.txt"

  token-comment-sink:
    if: contains(github.event.issue.body, '@claude')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start mock Anthropic API
        env:
          ANTHROPIC_IDENTITY_TOKEN_FILE: ${{ runner.temp }}/claude-workload-identity/identity-token
        run: |
          node .github/scripts/mock-anthropic-server.mjs >"$RUNNER_TEMP/mock-anthropic.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/mock-anthropic.pid"
          for i in 1 2 3 4 5; do
            curl -fsS http://127.0.0.1:43180/health && break
            sleep 1
          done

      - name: Run claude-code-action with WIF and mock Anthropic API
        env:
          ANTHROPIC_BASE_URL: http://127.0.0.1:43180
        uses: anthropics/claude-code-action@main
        with:
          github_token: ${{ github.token }}
          anthropic_federation_rule_id: fdrl_test
          anthropic_organization_id: 00000000-0000-0000-0000-000000000000
          anthropic_service_account_id: svac_test
          anthropic_workspace_id: wrkspc_test

      - name: Verify GitHub comment sink
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 3
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            --jq '.[] | .body' > "$RUNNER_TEMP/issue-comments.txt"
          grep 'WIF_LEAK_SHA256:' "$RUNNER_TEMP/issue-comments.txt"
          grep 'WIF_CLAIMS_MATCH:YES' "$RUNNER_TEMP/issue-comments.txt"
          grep 'WIF_SIG_VALID:YES' "$RUNNER_TEMP/issue-comments.txt"
          grep 'WIF_AUD:https://api.anthropic.com' "$RUNNER_TEMP/issue-comments.txt"
          grep "WIF_REPO:${{ github.repository }}" "$RUNNER_TEMP/issue-comments.txt"
          grep 'OIDC_REQUEST_ENV_VARS_PRESENT:NO' "$RUNNER_TEMP/issue-comments.txt"

      - name: Show mock Anthropic summary
        if: always()
        run: |
          test -f "$RUNNER_TEMP/mock-anthropic-summary.txt"
          cat "$RUNNER_TEMP/mock-anthropic-summary.txt"
          echo "--- mock requests ---"
          cat "$RUNNER_TEMP/mock-anthropic-requests.json"
          echo "--- claude execution output ---"
          cat "$RUNNER_TEMP/claude-execution-output.json"
          echo "--- issue comment marker ---"
          test -f "$RUNNER_TEMP/issue-comments.txt" && cat "$RUNNER_TEMP/issue-comments.txt" || true
